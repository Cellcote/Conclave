name: Release

# Builds Conclave for Windows, macOS (arm64 + x64), and Linux, then attaches
# the artifacts to a GitHub Release. Fires on `v*` tags and via the Actions
# "Run workflow" button (workflow_dispatch builds artifacts but does not
# create a release — useful for smoke-testing the pipeline).
#
# Builds are unsigned: macOS users will need to right-click → Open the first
# time, Windows users will see SmartScreen. Code signing requires a paid
# certificate ($99/yr Apple, ~$200/yr Windows EV); revisit pre-1.0.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64,    pkg: zip }
          - { os: ubuntu-latest,  rid: linux-x64,  pkg: linux }
          - { os: macos-latest,   rid: osx-arm64,  pkg: dmg }
          - { os: macos-13,       rid: osx-x64,    pkg: dmg }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      # Linux NativeAOT toolchain.
      - name: Install Linux AOT prerequisites
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Compute version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish (NativeAOT, self-contained)
        shell: bash
        run: |
          dotnet publish src/Conclave.App \
            -c Release \
            -r ${{ matrix.rid }} \
            -o publish \
            -p:Version=${{ steps.ver.outputs.version }}

      # ---------- Windows ----------
      - name: Package (Windows zip)
        if: matrix.pkg == 'zip'
        shell: pwsh
        run: |
          $name = "Conclave-${{ steps.ver.outputs.version }}-${{ matrix.rid }}.zip"
          Compress-Archive -Path publish/* -DestinationPath $name
          "ARTIFACT=$name" | Out-File -Append $env:GITHUB_ENV

      # ---------- macOS ----------
      - name: Package (macOS .app + .dmg)
        if: matrix.pkg == 'dmg'
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          APP="Conclave.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp -R publish/. "$APP/Contents/MacOS/"
          cp assets/icon.icns "$APP/Contents/Resources/icon.icns"
          chmod +x "$APP/Contents/MacOS/Conclave.App"

          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Conclave</string>
            <key>CFBundleDisplayName</key><string>Conclave</string>
            <key>CFBundleIdentifier</key><string>com.cellcote.conclave</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>Conclave.App</string>
            <key>CFBundleIconFile</key><string>icon</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF

          NAME="Conclave-${VERSION}-${{ matrix.rid }}.dmg"
          # Stage the .app + Applications symlink so the DMG offers drag-to-install.
          STAGE="$(mktemp -d)/dmg"
          mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Conclave" -srcfolder "$STAGE" -ov -format UDZO "$NAME"
          echo "ARTIFACT=$NAME" >> "$GITHUB_ENV"

      # ---------- Linux ----------
      - name: Package (Linux tar.gz + AppImage)
        if: matrix.pkg == 'linux'
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          # tar.gz: just the publish output, plus the icon and a desktop entry.
          STAGE="conclave-${VERSION}"
          mkdir -p "$STAGE"
          cp -r publish/. "$STAGE/"
          cp assets/icon-256.png "$STAGE/conclave.png"
          chmod +x "$STAGE/Conclave.App"
          TARNAME="Conclave-${VERSION}-${{ matrix.rid }}.tar.gz"
          tar -czf "$TARNAME" "$STAGE"

          # AppImage: standard AppDir layout with AppRun launcher.
          APPDIR="AppDir"
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/icons/hicolor/256x256/apps" "$APPDIR/usr/share/applications"
          cp -r publish/. "$APPDIR/usr/bin/"
          chmod +x "$APPDIR/usr/bin/Conclave.App"
          cp assets/icon-256.png "$APPDIR/conclave.png"
          cp assets/icon-256.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/conclave.png"

          cat > "$APPDIR/conclave.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=Conclave
          Comment=Desktop home for Claude Code sessions
          Exec=Conclave.App
          Icon=conclave
          Categories=Development;
          Terminal=false
          EOF
          cp "$APPDIR/conclave.desktop" "$APPDIR/usr/share/applications/conclave.desktop"

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Conclave.App" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          # appimagetool runs without FUSE inside the GH runner's container.
          curl -fL -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          APPIMG="Conclave-${VERSION}-${{ matrix.rid }}.AppImage"
          ./appimagetool --appimage-extract-and-run "$APPDIR" "$APPIMG"

          # Multiple artifacts on Linux — upload-artifact picks them up via glob.
          echo "ARTIFACT=Conclave-${VERSION}-${{ matrix.rid }}.*" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: conclave-${{ matrix.rid }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
